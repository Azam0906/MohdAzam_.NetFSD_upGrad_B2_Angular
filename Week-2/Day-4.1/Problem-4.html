<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Commerce Landing</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Minimal theme override -->
  <style>
    :root {
      --bs-primary: #0d6efd;
    }
  </style>
</head>
<body>

<!-- Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-primary navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">ShopNow</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" id="menu">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="bg-light py-5 text-center">
  <div class="container">
    <h1 class="fw-bold">Best Deals on Electronics</h1>
    <p class="text-muted">Quality products at affordable prices</p>
    <button class="btn btn-primary">Shop Now</button>
  </div>
</section>

<!-- Product Carousel -->
<div class="container my-5">
  <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner text-center">

      <div class="carousel-item active">
        <h4>Laptop</h4>
        <p>High performance</p>
      </div>

      <div class="carousel-item">
        <h4>Smartphone</h4>
        <p>Latest technology</p>
      </div>

      <div class="carousel-item">
        <h4>Headphones</h4>
        <p>Crystal clear sound</p>
      </div>

    </div>

    <button class="carousel-control-prev" data-bs-target="#productCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" data-bs-target="#productCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</div>

<!-- Products Section -->
<div class="container mb-5">
  <div class="row g-4">
    <div class="col-12 col-md-4">
      <div class="card h-100 text-center">
        <div class="card-body">
          <h5>Tablet</h5>
          <button class="btn btn-outline-primary btn-sm">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card h-100 text-center">
        <div class="card-body">
          <h5>Smart Watch</h5>
          <button class="btn btn-outline-primary btn-sm">Buy</button>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="card h-100 text-center">
        <div class="card-body">
          <h5>Camera</h5>
          <button class="btn btn-outline-primary btn-sm">Buy</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Newsletter -->
<section class="bg-primary text-white py-4">
  <div class="container text-center">
    <h5>Subscribe to Newsletter</h5>
    <form class="row justify-content-center g-2 mt-2">
      <div class="col-8 col-md-4">
        <input type="email" class="form-control" placeholder="Enter email">
      </div>
      <div class="col-auto">
        <button class="btn btn-light">Subscribe</button>
      </div>
    </form>
  </div>
</section>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
