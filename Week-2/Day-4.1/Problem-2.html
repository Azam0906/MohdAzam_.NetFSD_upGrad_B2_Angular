<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Listing</title>

  <!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container py-4">
  <h2 class="text-center mb-4">Electronics Store</h2>

  <div class="row g-4">
    
    <!-- Product 1 -->
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Laptop</h5>
          <p class="card-text">High performance laptop</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm ms-2">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Mobile Phone</h5>
          <p class="card-text">Latest smartphone</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm ms-2">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Headphones</h5>
          <p class="card-text">Noise cancelling</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm ms-2">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <h5 class="card-title">Smart Watch</h5>
          <p class="card-text">Fitness tracking</p>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm ms-2">View Details</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
