<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

     <style>
        body {
            font-family: Arial, sans-serif;
            background-color: blanchedalmond;
        }

        .cart {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
            margin-bottom: 10px;
            background-color: burlywood;
            border-radius: 10px;
        }

        .added {
            color: green;
            font-size: 14px;
            margin-left: 10px;
        }

        button {
            margin-top: 5px;
            padding: 5px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>


</head>
<body>
    <h3>Products</h3>

<div class="cart">
    Cart Items: <span id="cartCount">0</span>
</div>

<div id="productList">

    <div class="product">
        <p>Product 1 - ₹550</p>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <p>Product 2 - ₹800</p>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <p>Product 3 - ₹1200</p>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <p>Product 4 - ₹300</p>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

</div>

<script>
$(document).ready(function () {

    var cartCount = 0;

    // event delegation
    $("#productList").on("click", ".addBtn", function () {

        cartCount++;
        $("#cartCount").text(cartCount);

        // disable button
        $(this).prop("disabled", true);
        $(this).text("Added");

        // show confirmation message
        $(this).siblings(".msg").text("Added to cart").addClass("added");
    });

});
</script>
</body>
</html>
