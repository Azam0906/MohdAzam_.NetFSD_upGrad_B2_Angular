<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        form {
            width: 350px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 8px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h3>Student Feedback Form</h3>

<form id="feedbackForm">

    <div class="form-group">
        <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="form-group">
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
        <select id="rating">
            <option value="">Select course rating</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
        </select>
    </div>

    <div class="form-group">
        <textarea id="comments" placeholder="Enter your comments"></textarea>
    </div>

    <div class="form-group">
        <button type="submit">Submit</button>
    </div>

    <p class="error"></p>

</form>

<div id="message"></div>

<script>
$(document).ready(function () {

    $("#feedbackForm").submit(function (e) {
        e.preventDefault();

        var name = $("#name").val().trim();
        var email = $("#email").val().trim();

        $(".error").text("");
        $("#message").html("");

        if (name === "" || email === "") {
            $(".error").text("Please enter both Name and Email.");
            return;
        }

        $("#message").html(
            "<p class='success'>Thank you! Your feedback has been submitted successfully.</p>"
        );

        $("#feedbackForm")[0].reset();
    });

});
</script>

</body>
</html>
